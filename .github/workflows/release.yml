name: Build & Release Plugin

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Build plugin ZIP and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update version in plugin file
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          sed -i "s/Version:           .*/Version:           ${PLUGIN_VERSION}/" wc-product-health-check.php
          sed -i "s/define( 'WPHC_VERSION', '.*' );/define( 'WPHC_VERSION', '${PLUGIN_VERSION}' );/" wc-product-health-check.php

      - name: Create plugin directory
        run: |
          mkdir -p dist/product-health-check-woocommerce
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='dist' \
            --exclude='README.md' \
            ./ dist/product-health-check-woocommerce/

      - name: Generate ZIP
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        working-directory: dist
        run: zip -r "../product-health-check-woocommerce-${PLUGIN_VERSION}.zip" product-health-check-woocommerce/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: product-health-check-woocommerce-${{ steps.version.outputs.VERSION }}.zip
